<h2>Create Post</h2>

<form method="post" action="{% url 'post_create' %}">
    {% csrf_token %}

    <label>Title:</label><br>
    <input type="text" name="title"><br><br>

    <label>Content:</label><br>
    <textarea name="content"></textarea><br><br>

    <button type="submit">Create</button>
</form>
